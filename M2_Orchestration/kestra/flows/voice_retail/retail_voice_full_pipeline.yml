id: retail_voice_full_pipeline
namespace: dev.retail.voice
description: "Pipeline principal: Ingesta Kaggle, Carga Postgres y Trigger dbt"

tasks:
  - id: start_pipeline
    type: io.kestra.plugin.core.log.Log
    message: "íş Iniciando pipeline de Voice AI para Retail"

  - id: ingest_kaggle_data
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install pandas sqlalchemy psycopg2-binary
    # Este paso ejecuta tu script de ingesta del Modulo 1
    script: |
      import os
      print("íłĽ Cargando datos de Kaggle a Postgres 18...")
      # AquĂ­ Kestra dispara el proceso de carga masiva
    
  - id: run_dbt_transformations
    type: io.kestra.plugin.core.log.Log
    message: "íł Ejecutando transformaciones de dbt en el Module 4..."
    # En producciĂłn aquĂ­ usarĂ­as io.kestra.plugin.dbt.cli.DbtCLI

  - id: notify_api_ready
    type: io.kestra.plugin.core.http.Request
    uri: "http://api_integration:8000/status"
    method: "GET"
    description: "Verifica que la API de Voice AI estĂŠ lista para recibir llamadas"

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 9 * * *" # Se ejecuta todas las maĂąanas a las 9 AM

version: '3.9'

services:

  # ------------------------
  # 🟣 POSTGRES (CORE)
  # ------------------------
  pgdatabase:
    image: postgres:18-alpine
    container_name: postgres_18_retail
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: retail_db
    volumes:
      - ./ny_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pg-network

  # ------------------------
  # 🌐 PGADMIN
  # ------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_retail
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "8085:80"
    networks:
      - pg-network

  # ------------------------
  # 🔴 REDPANDA (Kafka)
  # ------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    container_name: redpanda_streaming
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
    networks:
      - streaming-network

  # ------------------------
  # ⚡ SPARK
  # ------------------------
  spark:
    image: bitnami/spark:3.5
    container_name: spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"
    networks:
      - streaming-network

# ------------------------
# 🌐 NETWORKS
# ------------------------
networks:
  pg-network:
    driver: bridge

  streaming-network:
    driver: bridge